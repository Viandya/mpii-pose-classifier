name: CI Pipeline

on: [push, pull_request]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx

    - name: Run tests
      run: |
        PYTHONPATH=. python -m pytest tests/ -v

    - name: Build Docker image
      run: docker build -t pose-classifier:latest .

    - name: Push to Registry
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag pose-classifier:latest ${{ secrets.REGISTRY }}/pose-classifier:${{ github.sha }}
        docker push ${{ secrets.REGISTRY }}/pose-classifier:${{ github.sha }}
